services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
  ui:
    build: .
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api
